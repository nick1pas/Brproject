#=============================================================
#                       Safe Disconnect
#=============================================================
# Ativa o modo Safe Disconnect. Mantém o personagem no mundo por um tempo.
SafeDisconnectEnabled = True

# Tempo de espera antes de remover o personagem (ms). Padrão: 5 minutos.
SafeDisconnectTimeoutMs = 300000

# Título exibido enquanto aguarda reconexão.
SafeDisconnectTitle = Disconnect...

# Imobiliza o personagem durante o Safe Disconnect.
SafeDisconnectImmobilize = True

# Deixa o personagem invulnerável durante o Safe Disconnect.
SafeDisconnectInvulnerable = True

# Delay para restaurar o AutoFarm após reconectar (ms).
SafeDisconnectAutoFarmRestoreDelayMs = 1500

# Altera a cor do nick durante o Safe Disconnect.
SafeDisconnectChangeNameColor = True
# Cor em HEX (sem 0x). Ex: 00FFFF (Amarelo)
SafeDisconnectNameColor = 00FFFF

# Permitir Safe Disconnect em situações específicas:
SafeDisconnectAllowOlympiad = True
SafeDisconnectAllowBoss = True
SafeDisconnectAllowQuest = True
SafeDisconnectAllowFarm = True

# Integrações do Safe Disconnect (pausa/retoma regras específicas)
SafeDisconnectIntegrationOlympiad = True
SafeDisconnectIntegrationDungeon = True
SafeDisconnectIntegrationTournament = True
SafeDisconnectIntegrationTvT = True
SafeDisconnectIntegrationCTF = True
SafeDisconnectIntegrationDM = True
SafeDisconnectIntegrationLM = True
