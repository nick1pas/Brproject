#=============================================================
#         GC - Limpeza de Itens no Chão
#=============================================================
# Remove itens caidos no chao apos X segundos (funcao alinhada ao GC).
# Quando habilitado, aplica tempo maximo de vida para todos os itens no chao.
# ItemsGcCleanupEnabled = true/false (liga/desliga a limpeza)
# ItemsGcCleanupTime = segundos para remover itens do chao (padrao 120)
#=============================================================
ItemsGcCleanupEnabled = True
ItemsGcCleanupTime = 120

#=============================================================
#         Itens Level / Delevel - Configuração Dinâmica
#=============================================================
# Administra itens que podem dar level ou delevel a personagens.
# Os itens devem ter <set name="handler" val="ItemLevelDelevel" /> no item XML.
#
# Formato por item: ItemLevelDelevel_<itemId>=<levelAdd>,<levelRemove>
#
# levelAdd:  Número de níveis a ADICIONAR
#            0   = não adiciona nível
#            1-N = adiciona N níveis
#            -1  = level FULL (level máximo do servidor)
#
# levelRemove: Número de níveis a REMOVER
#              0   = não remove nível
#              1-N = remove N níveis
#              -1  = delevel FULL (volta para level 1)
#
# Exemplos:
# ItemLevelDelevel_12345=10,0   -> item 12345 adiciona 10 levels
# ItemLevelDelevel_12346=1,0    -> item 12346 adiciona 1 level
# ItemLevelDelevel_12347=-1,0   -> item 12347 dá level máximo
# ItemLevelDelevel_12348=0,5    -> item 12348 remove 5 levels
# ItemLevelDelevel_12349=0,-1   -> item 12349 remove todos os levels (level 1)
# ItemLevelDelevel_12350=5,3    -> item 12350 adiciona 5 e remove 3 (resultado: +2)
# Configuração dos itens Level/Delevel (altere os IDs conforme seus itens):

# ItemLevelDelevel_10002=10,0
# ItemLevelDelevel_10003=-1,0
# ItemLevelDelevel_10004=0,1
# ItemLevelDelevel_10005=0,-1

ItemLevelDelevel_4037=1,0

#=============================================================
#         Itens Premium VIP - Configuração Dinâmica
#=============================================================
# Administra itens que concedem tempo de premium VIP ao personagem.
# Os itens devem ter <set name="handler" val="ItemPremium" /> no item XML.
#
# Formato por item: ItemPremium_<itemId>=<minutes>,<hours>,<days>
# Exemplos:
# ItemPremium_10010=30,0,0   -> item 10010 adiciona 30 minutos
# ItemPremium_10011=0,2,0    -> item 10011 adiciona 2 horas
# ItemPremium_10012=0,0,7    -> item 10012 adiciona 7 dias
# ItemPremium_10013=30,2,1   -> item 10013 adiciona 1 dia, 2 horas e 30 minutos
#=============================================================
#Exemplos: quantidade de minutos, horas, dias
ItemPremium_5556=0,0,1

