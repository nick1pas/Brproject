# =================================================================
#                    Movimento Realista (Anti-Deslizamento)
# =================================================================

# Habilita sistema de movimento realista para eliminar efeito de "deslizamento"
# Quando ativado, o movimento será mais discreto e realista, simulando passos
# Padrão: True
EnableRealisticMovement = False

# Tamanho do passo em unidades para movimento discreto
# Valores menores = movimento mais suave (mais próximo do atual)
# Valores maiores = movimento mais discreto (mais realista)
# Padrão: 8 (equilibrado entre suavidade e realismo)
MovementStepSize = 14

# Intervalo mínimo entre atualizações de posição em milissegundos
# Valores menores = movimento mais fluido (mais CPU)
# Valores maiores = movimento mais discreto (menos CPU)
# Padrão: 150 (equilibrado)
MovementUpdateInterval = 75

# Habilita interpolação suave entre passos discretos
# Quando True, mantém suavidade visual mas com passos discretos
# Quando False, movimento completamente discreto
# Padrão: True
EnableStepInterpolation = False

# Fator de aceleração/desaceleração para início e fim do movimento
# 1.0 = velocidade constante (atual)
# < 1.0 = aceleração gradual (mais realista)
# > 1.0 = movimento mais abrupto
# Padrão: 0.8 (aceleração gradual)
MovementAccelerationFactor = 0.2

# Habilita correção de altura baseada no terreno durante movimento
# Quando True, ajusta automaticamente a altura Z baseada no terreno
# Padrão: True
EnableTerrainHeightCorrection = False

# Tolerância de altura para correção automática do terreno
# Valores maiores = mais permissivo com diferenças de altura
# Valores menores = mais restritivo
# Padrão: 32
TerrainHeightTolerance = 32

# =================================================================
#                    Pathfinding para Ataques e Skills
# =================================================================

# Habilita uso de PathFinder avançado com todas as melhorias para ataques e skills
# Quando True: Usa PathFinder.kt com interpolação de curvas, suavização e desvio de obstáculos
# Quando False: Mantém comportamento atual (maybeStartOffensiveFollow padrão)
# Padrão: False (mantém compatibilidade com código existente)
# 
# MELHORIAS ATIVADAS QUANDO True:
# - Interpolação Catmull-Rom Spline para rotas suaves
# - Path smoothing inteligente (remove nós redundantes)
# - Desvio automático de obstáculos em tempo real
# - Otimização para zonas de paz (linha reta quando possível)
# - Respeita ranges de armas e skills precisamente
# - Máximo desempenho de processamento
# 
# RECOMENDADO PARA:
# - Servidores que priorizam precisão de combate
# - Servidores com CPU suficiente para pathfinding avançado
# - Servidores que querem movimento mais realista em combate
# 
# NÃO RECOMENDADO PARA:
# - Servidores com CPU limitado
# Ativa pathfinding otimizado para ataques e skills de players.
# Quando ativado, usa PathFinder com interpolação de curvas Catmull-Rom, suavização de rotas
# e evasão de obstáculos em tempo real para movimento de combate.
# 
# Benefícios quando ativado (True):
# - Rotas mais suaves e realistas com interpolação de curvas
# - Melhor desvio de obstáculos durante combate
# - Movimento mais preciso para arqueiros e classes de longo alcance
# - Otimização automática para zonas de paz (linha reta quando possível)
# 
# Quando desativado (False):
# - Usa sistema legado de pathfinding (comportamento padrão)
# - Mantém compatibilidade total com versões anteriores
# 
# Recomendado para:
# - Servidores que priorizam qualidade visual e precisão de movimento
# - Servidores com muitos players em combate simultâneo
# - Servidores que querem aproveitar todas as melhorias de pathfinding
# 
# NÃO recomendado para:
# - Servidores que priorizam performance extrema sobre qualidade visual
# - Servidores de teste/desenvolvimento (pode adicionar overhead mínimo)
AttackUsePathfinder = True

# =================================================================
#                    Colisão entre Criaturas
# =================================================================
# Habilita sistema de colisão suavizada entre criaturas (NPCs, Monstros).
# Quando ativado, criaturas não passam umas pelas outras, procurando
# posições alternativas ao redor do alvo para atacar.
#
# RECOMENDADO PARA:
# - Servidores que querem movimentação realista similar ao L2OFF
# - Servidores que querem evitar que monstros passem uns pelos outros
# - Servidores com CPU suficiente para processamento adicional
#
# NÃO RECOMENDADO PARA:
# - Servidores com CPU muito limitado
# - Servidores que priorizam performance extrema sobre realismo
EnableCreatureCollision = False

# Raio de verificação de colisão entre criaturas (em unidades do jogo)
# Valores maiores = detecta colisões mais distantes, mas usa mais CPU
# Valores menores = mais eficiente, mas pode perder algumas colisões
# Padrão: 150
CreatureCollisionCheckRadius = 150

# Raio de evasão de colisão (distância ideal ao redor do alvo)
# Valores maiores = criaturas ficam mais distantes umas das outras
# Valores menores = criaturas ficam mais próximas, mas podem colidir
# Padrão: 80
CreatureCollisionAvoidanceRadius = 80

# Número máximo de posições alternativas a testar ao redor do alvo
# Valores maiores = mais opções de posicionamento, mas usa mais CPU
# Valores menores = mais eficiente, mas menos opções
# Padrão: 8 (testa 8 posições ao redor do alvo)
MaxAlternativePositions = 8

# Força de empurrão suavizada quando há colisão (0.0 a 1.0)
# Valores maiores = empurrão mais forte, movimento mais visível
# Valores menores = empurrão mais suave, movimento mais natural
# Padrão: 0.3
CreatureCollisionPushForce = 0.3

# =================================================================
#                    Sistema de Cache de Pathfinding
# =================================================================

# Habilita sistema de cache de pathfinding para economizar CPU
# Quando ativado, rotas são pré-calculadas e armazenadas em memória/arquivo
# Padrão: True
EnablePathfinderCache = False

# Tamanho máximo do cache em memória (número de rotas)
# Valores maiores = mais memória usada, mas menos recálculos
# Valores menores = menos memória, mas mais recálculos
# Padrão: 10000
PathfinderCacheSize = 10000

# Diretório para armazenar arquivos de cache
# Padrão: ./data/pathfinder_cache/
PathfinderCacheDirectory = ./data/pathfinder_cache/

# Habilita compressão dos arquivos de cache
# Quando True, arquivos são comprimidos com GZIP (economia de espaço)
# Quando False, arquivos são salvos sem compressão (carregamento mais rápido)
# Padrão: True
CompressCacheFiles = False

# Número de threads para geração de rotas em background
# -1 = Automático (usa número de núcleos da CPU)
# 0 = Desabilitado (processa no thread principal)
# 1+ = Número específico de threads
# Padrão: 4
PathfinderGenerationThreads = 4

# Intervalo em dias para limpeza automática de arquivos de cache antigos
# Arquivos mais antigos que este valor são removidos automaticamente
# 0 = Desabilita limpeza automática
# Padrão: 30
CacheCleanupIntervalDays = 30

# Habilita pré-cálculo automático de rotas entre waypoints importantes
# Quando ativado, calcula rotas entre pontos estratégicos na inicialização
# Padrão: True
EnableAutoPreCalculation = False

# Distância máxima para pré-cálculo de rotas entre waypoints
# Rotas mais longas que este valor não são pré-calculadas
# Padrão: 2000 (aproximadamente 20 células de jogo)
MaxPreCalculationDistance = 2000

# Intervalo em milissegundos para salvar cache automaticamente
# 0 = Desabilita salvamento automático
# Padrão: 300000 (5 minutos)
AutoSaveInterval = 300000

# =================================================================
#                    GUIA DE CONFIGURAÇÃO
# =================================================================
# 
# ┌─────────────────────────────────────────────────────────────────┐
# │ CENÁRIO 1: Servidor com POUQUÍSSIMOS recursos (< 2GB RAM)       │
# └─────────────────────────────────────────────────────────────────┘
# UseMinimalGeoOnly = True
# SistemaPathfinding = True (será forçado para False automaticamente)
# UseOptimizedMovement = True (será forçado para False automaticamente)
# EnableRealisticMovement = True
# MovementStepSize = 12 (passos maiores para economia)
# MovementUpdateInterval = 200 (menos frequente)
# 
# RESULTADO: Usa apenas GeoEngineMinimal
# - NÃO carrega geodata na RAM
# - NÃO calcula pathfinding
# - Players atravessam paredes
# - Economia: ~300-800 MB RAM + 50-70% CPU
# 
# ┌─────────────────────────────────────────────────────────────────┐
# │ CENÁRIO 2: Servidor com poucos recursos mas quer pathfinding    │
# └─────────────────────────────────────────────────────────────────┘
# UseMinimalGeoOnly = False
# SistemaPathfinding = True
# UseOptimizedMovement = False
# EnableRealisticMovement = True
# MovementStepSize = 8 (padrão)
# MovementUpdateInterval = 150 (padrão)
# 
# RESULTADO: Usa GeoEngine (legado)
# - Carrega geodata completa
# - Pathfinding funcional básico
# - Menor uso de CPU que o otimizado
# 
# ┌─────────────────────────────────────────────────────────────────┐
# │ CENÁRIO 3: Servidor balanceado (recomendado)                    │
# └─────────────────────────────────────────────────────────────────┘
# UseMinimalGeoOnly = False
# SistemaPathfinding = True
# UseOptimizedMovement = True
# EnableRealisticMovement = True
# MovementStepSize = 8 (padrão)
# MovementUpdateInterval = 150 (padrão)
# MovementAccelerationFactor = 0.8 (padrão)
# 
# RESULTADO: Usa GeoEngineOptimized
# - Carrega geodata completa
# - Pathfinding otimizado e cache
# - Melhor fidelidade L2OFF
# - Uso balanceado de recursos
# 
# ┌─────────────────────────────────────────────────────────────────┐
# │ CENÁRIO 4: Servidor de testes rápidos (sem geodata)             │
# └─────────────────────────────────────────────────────────────────┘
# UseMinimalGeoOnly = False
# SistemaPathfinding = False
# UseOptimizedMovement = False
# EnableRealisticMovement = True
# MovementStepSize = 16 (passos grandes para testes)
# MovementUpdateInterval = 100 (mais rápido)
# 
# RESULTADO: Usa GeoEngineMinimal via MovementIntegration
# - NÃO carrega geodata
# - Funciona similar ao UseMinimalGeoOnly
# - Útil para testes de scripts/eventos

# =================================================================
#                    CONFIGURAÇÕES DE TESTE
# =================================================================

# ┌─────────────────────────────────────────────────────────────────┐
# │ TESTE 1: Movimento Ultra Suave (deslizamento mínimo)           │
# └─────────────────────────────────────────────────────────────────┘
# EnableRealisticMovement = True
# MovementStepSize = 4
# MovementUpdateInterval = 50
# EnableStepInterpolation = True
# MovementAccelerationFactor = 0.6
# 
# RESULTADO: Movimento muito suave, quase imperceptível
# - CPU: Alto
# - Fluidez: Máxima
# - Realismo: Baixo

# ┌─────────────────────────────────────────────────────────────────┐
# │ TESTE 2: Movimento Realista (recomendado)                      │
# └─────────────────────────────────────────────────────────────────┘
# EnableRealisticMovement = True
# MovementStepSize = 8
# MovementUpdateInterval = 150
# EnableStepInterpolation = True
# MovementAccelerationFactor = 0.8
# 
# RESULTADO: Equilíbrio entre fluidez e realismo
# - CPU: Médio
# - Fluidez: Boa
# - Realismo: Alto

# ┌─────────────────────────────────────────────────────────────────┐
# │ TESTE 3: Movimento Discreto (passos visíveis)                  │
# └─────────────────────────────────────────────────────────────────┘
# EnableRealisticMovement = True
# MovementStepSize = 16
# MovementUpdateInterval = 300
# EnableStepInterpolation = False
# MovementAccelerationFactor = 1.0
# 
# RESULTADO: Movimento com passos claramente visíveis
# - CPU: Baixo
# - Fluidez: Baixa
# - Realismo: Máximo

# ┌─────────────────────────────────────────────────────────────────┐
# │ TESTE 4: Movimento Legado (atual)                              │
# └─────────────────────────────────────────────────────────────────┘
# EnableRealisticMovement = False
# 
# RESULTADO: Sistema de movimento atual (com deslizamento)
# - CPU: Médio
# - Fluidez: Máxima
# - Realismo: Baixo (deslizamento)

