# =================================================================
# LevelUpMaker - Sistema de Up Dinâmico e Perpétuo
# =================================================================
# Este arquivo deve ser salvo em UTF-8 para acentuação correta.
# Ativa/desativa o mod. Quando desativado, o quest mark não aparece.
LevelUpMakerEnabled = True

# ID do ícone de tutorial (quest mark). Use valor único não conflitante com outros eventos.
# Ex: 2000=Tournament, 2001=CTF, 2002=DM, 2003=LM, 2004=TvT, 2005=Random, 2006=BattleBoss
LevelUpMakerQuestionMarkId = 2010

# Diferença de nível entre monstro alvo e personagem (ex: 5 = monstro 5 levels acima).
LevelUpMakerLevelOffset = 5

# Margem de tolerância no nível do monstro (ex: 2 = aceita monstro entre offset-2 e offset+2).
LevelUpMakerLevelTolerance = 2

# Range mínimo e máximo (em unidades) para teleportar perto do monstro.
LevelUpMakerTeleportMinRange = 200
LevelUpMakerTeleportMaxRange = 400

# Tempo de cast em ms para efeito visual do scroll (skill 2040). 10000 = 10 segundos.
LevelUpMakerCastTimeMs = 10000

# ID da skill visual do teleporte (scroll de escape = 2040).
LevelUpMakerScrollSkillId = 2040
LevelUpMakerScrollSkillLevel = 1

# Intervalo em segundos para reenviar quest mark a jogadores online (quando nenhum evento ativo).
LevelUpMakerRefreshIntervalSec = 500

# Segundos após cada level up para mostrar o quest mark (0 = desativado, não mostra após level).
LevelUpMakerLevelUpDelaySec = 120

# Lista de mensagens dinâmicas (alternadas). Use | como separador.
# Variáveis: %level% = nível alvo do monstro, %player_level% = nível do jogador.
LevelUpMakerMessages = Clique para ser teleportado para monstros nível %level%!|Up dinâmico: você será enviado para área de monstros level %level%.|Pronto para farm? Será teleportado perto de monstros nível %level%.|Nenhum evento ativo! Teleporte para área de up (nível %level%).|Sistema LevelUpMaker: teleporte automático para monstros %level%.

# Título exibido no HTML (ex: Level Up Maker).
LevelUpMakerHtmlTitle = Level Up Maker

# Texto do botão de teleporte.
LevelUpMakerButtonLabel = Teleport to Up Area

# Mensagem exibida quando não há monstro adequado encontrado.
LevelUpMakerNoMonsterMessage = Nenhum monstro adequado encontrado no momento. Tente novamente mais tarde.

# Mensagem quando jogador não pode teleportar (combate, morto, etc).
LevelUpMakerCannotTeleportMessage = Você não pode usar o teleporte no momento. Verifique se está em combate ou em área restrita.
